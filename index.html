<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Vault Blueprint</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1d23; overflow: hidden; height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
  #canvas { position: absolute; top: 0; left: 0; }
  #loading {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #1a1d23; color: #667; font-size: 14px;
  }
  #loading.hidden { display: none; }
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    color: #8899aa; font-size: 12px;
  }
  #hud h1 { font-size: 16px; color: #cdd; font-weight: 500; margin-bottom: 2px; }
  #hud p { font-size: 11px; color: #667; margin-bottom: 8px; }
  #search-box {
    background: rgba(30,33,40,0.95); border: 1px solid #2a2d35;
    color: #cdd; padding: 5px 10px; border-radius: 4px; font-size: 12px;
    width: 220px; outline: none; font-family: inherit;
  }
  #search-box:focus { border-color: #6366f1; }
  #search-box::placeholder { color: #556; }
  #search-results {
    margin-top: 4px; font-size: 11px; color: #667;
    max-height: 180px; overflow-y: auto;
  }
  .search-item {
    padding: 3px 6px; cursor: pointer; border-radius: 3px;
    display: flex; align-items: center; gap: 6px;
  }
  .search-item:hover { background: rgba(99,102,241,0.2); color: #cdd; }
  .search-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
  #legend-box {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    background: rgba(20,22,28,0.9); border: 1px solid #2a2d35;
    border-radius: 6px; padding: 10px 14px;
  }
  .leg { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 11px; color: #899; cursor: pointer; user-select: none; }
  .leg:hover { color: #cdd; }
  .leg.disabled { opacity: 0.35; }
  .leg-check { width: 10px; height: 10px; border-radius: 2px; border: 1px solid #556; display: flex; align-items: center; justify-content: center; font-size: 8px; }
  .leg-check.on { background: rgba(255,255,255,0.1); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; }
  .leg-btns { display: flex; gap: 4px; margin-bottom: 6px; border-bottom: 1px solid #2a2d35; padding-bottom: 6px; }
  .leg-btn {
    background: rgba(30,33,40,0.9); border: 1px solid #2a2d35;
    color: #899; padding: 2px 8px; border-radius: 3px; font-size: 10px;
    cursor: pointer; flex: 1; text-align: center;
  }
  .leg-btn:hover { background: #2a2d35; color: #cdd; }
  #info-panel {
    position: fixed; top: 50%; right: 12px; z-index: 15;
    transform: translateY(-50%);
    background: rgba(20,22,28,0.95); border: 1px solid #2a2d35;
    border-radius: 6px; padding: 14px 16px; width: 280px;
    display: none; color: #899; font-size: 11px;
    max-height: 70vh; overflow-y: auto;
  }
  #info-panel.visible { display: block; }
  #info-panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  #info-panel .info-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  #info-panel .info-section { margin-top: 10px; }
  #info-panel .info-section h3 { font-size: 11px; color: #667; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  #info-panel .info-conn { padding: 3px 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #info-panel .info-conn:hover { color: #cdd; }
  #info-panel .info-conn-dot { width: 5px; height: 5px; border-radius: 1px; flex-shrink: 0; }
  #info-panel .info-conn-arrow { color: #556; flex-shrink: 0; }
  #info-panel .info-path { color: #556; font-size: 10px; font-style: italic; margin-bottom: 8px; }
  #info-panel .info-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 4px; }
  #wire-tooltip {
    position: fixed; z-index: 20; pointer-events: none;
    background: rgba(20,22,28,0.95); border: 1px solid #3a3d45;
    border-radius: 4px; padding: 4px 8px; font-size: 11px; color: #cdd;
    display: none; white-space: nowrap;
  }
  #minimap {
    position: fixed; bottom: 12px; right: 12px; z-index: 10;
    background: rgba(20,22,28,0.85); border: 1px solid #2a2d35; border-radius: 4px;
    width: 180px; height: 120px;
  }
  #controls-bar {
    position: fixed; bottom: 12px; left: 12px; z-index: 10;
    display: flex; gap: 6px;
  }
  .cb {
    background: rgba(30,33,40,0.9); border: 1px solid #2a2d35;
    color: #899; padding: 5px 12px; border-radius: 4px; font-size: 11px;
    cursor: pointer;
  }
  .cb:hover { background: #2a2d35; color: #cdd; }
  #path-hint {
    position: fixed; bottom: 44px; left: 12px; z-index: 10;
    font-size: 11px; color: #fbbf24; display: none;
  }
  #stats-bar {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
    font-size: 10px; color: #445; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div id="loading">Loading blueprint...</div>
<canvas id="canvas"></canvas>
<div id="hud">
  <h1 id="bp-title">Vault Blueprint</h1>
  <p id="bp-subtitle">Scroll to zoom, drag to pan, click nodes to inspect, Shift+click for path tracing</p>
  <input type="text" id="search-box" placeholder="Search nodes... (Ctrl+F)">
  <div id="search-results"></div>
</div>
<div id="legend-box"></div>
<div id="info-panel"></div>
<div id="wire-tooltip"></div>
<canvas id="minimap"></canvas>
<div id="controls-bar">
  <button class="cb" id="btn-fit">Fit All</button>
  <button class="cb" id="btn-reset">Reset</button>
  <button class="cb" id="btn-export">Export PNG</button>
</div>
<div id="path-hint"></div>
<div id="stats-bar"></div>

<script>
// ===== GLOBAL DATA (loaded from JSON) =====
var CAT = {};
var GROUPS = [];
var N = [];
var W = [];
var nodeMap = {};
var blueprintMeta = {};

// ===== RENDERING CONSTANTS =====
var NODE_W = 220;
var PIN_H = 18;
var HEADER_H = 26;
var PIN_R = 5;

// ===== CANVAS SETUP =====
var cvs = document.getElementById('canvas');
var ctx = cvs.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var CW = window.innerWidth, CH = window.innerHeight;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  CW = window.innerWidth;
  CH = window.innerHeight;
  cvs.width = CW * dpr;
  cvs.height = CH * dpr;
  cvs.style.width = CW + 'px';
  cvs.style.height = CH + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== STATE =====
var panX = -300, panY = -50, zoom = 0.55;
var dragging = null, dragOff = {x:0,y:0};
var isPanning = false, panStart = {x:0,y:0};
var selectedNode = null;
var pathTargetNode = null;
var pathNodes = null;
var pathWires = null;
var didDrag = false;
var hoveredWire = null;
var mouseX = 0, mouseY = 0;
var searchQuery = '';

// ===== DATA LOADING =====
async function loadBlueprint() {
  // If data is embedded inline (for file:// usage), use it directly
  if (window.BLUEPRINT_DATA) return window.BLUEPRINT_DATA;
  // Otherwise fetch from JSON files
  var sources = ['blueprint.json', 'demo-blueprint.json'];
  for (var i = 0; i < sources.length; i++) {
    try {
      var resp = await fetch(sources[i]);
      if (resp.ok) {
        var data = await resp.json();
        if (data && data.categories && data.nodes) return data;
      }
    } catch(e) {}
  }
  return getFallbackData();
}

function getFallbackData() {
  return {
    meta: { title: "No Blueprint Found", subtitle: "Place a blueprint.json file in this directory" },
    categories: { note: { color: "#6366f1", dark: "#35386e", label: "Info" } },
    groups: [],
    nodes: [{
      id: "info", cat: "note", title: "No Data", x: 0, y: 0,
      desc: "Create a blueprint.json file with your vault architecture.",
      pins: { in: [], out: [] }
    }],
    wires: []
  };
}

function initializeData(data) {
  CAT = data.categories || {};
  Object.keys(CAT).forEach(function(k) { CAT[k].visible = true; });
  GROUPS = data.groups || [];
  N = data.nodes || [];
  W = data.wires || [];
  blueprintMeta = data.meta || {};
  nodeMap = {};

  N.forEach(function(n) {
    if (!n.pins) n.pins = { in: [], out: [] };
    if (!n.pins.in) n.pins.in = [];
    if (!n.pins.out) n.pins.out = [];
    var maxPins = Math.max(n.pins.in.length, n.pins.out.length, 1);
    n.w = NODE_W;
    n.h = HEADER_H + maxPins * PIN_H + 8;
    nodeMap[n.id] = n;
  });

  document.getElementById('bp-title').textContent = blueprintMeta.title || 'Vault Blueprint';
  var sub = blueprintMeta.subtitle || '';
  document.getElementById('bp-subtitle').textContent = sub + (sub ? ' | ' : '') + 'Scroll to zoom, drag to pan, click nodes, Shift+click for path tracing';
  document.getElementById('stats-bar').textContent = N.length + ' nodes \u00b7 ' + W.length + ' connections \u00b7 ' + Object.keys(CAT).length + ' categories';

  buildLegend();
}

// ===== CONNECTION HELPERS =====
function getWireNodeIds(w) {
  return { from: w.from.split('.')[0], to: w.to.split('.')[0] };
}
function getConnectedNodeIds(nodeId) {
  var ids = {};
  ids[nodeId] = true;
  W.forEach(function(w) {
    var ends = getWireNodeIds(w);
    if (ends.from === nodeId) ids[ends.to] = true;
    if (ends.to === nodeId) ids[ends.from] = true;
  });
  return ids;
}
function isWireConnected(w, nodeId) {
  var ends = getWireNodeIds(w);
  return ends.from === nodeId || ends.to === nodeId;
}
function countConnections(nodeId) {
  var c = 0;
  W.forEach(function(w) {
    var ends = getWireNodeIds(w);
    if (ends.from === nodeId || ends.to === nodeId) c++;
  });
  return c;
}
function getConnectionList(nodeId) {
  var out = [], inList = [];
  W.forEach(function(w, idx) {
    var ends = getWireNodeIds(w);
    if (ends.from === nodeId && nodeMap[ends.to]) {
      var pin = w.from.split('.')[1];
      var pinObj = null;
      nodeMap[nodeId].pins.out.forEach(function(p) { if (p.id === pin) pinObj = p; });
      out.push({ node: nodeMap[ends.to], label: pinObj ? pinObj.label : '', wireIdx: idx });
    }
    if (ends.to === nodeId && nodeMap[ends.from]) {
      var pin = w.to.split('.')[1];
      var pinObj = null;
      nodeMap[nodeId].pins.in.forEach(function(p) { if (p.id === pin) pinObj = p; });
      inList.push({ node: nodeMap[ends.from], label: pinObj ? pinObj.label : '', wireIdx: idx });
    }
  });
  return { outgoing: out, incoming: inList };
}

// ===== PATH TRACING (BFS) =====
function findPath(startId, endId) {
  var adj = {};
  N.forEach(function(n) { adj[n.id] = []; });
  W.forEach(function(w, idx) {
    var ends = getWireNodeIds(w);
    if (!nodeMap[ends.from] || !nodeMap[ends.to]) return;
    if (!CAT[nodeMap[ends.from].cat].visible || !CAT[nodeMap[ends.to].cat].visible) return;
    adj[ends.from].push({ to: ends.to, wireIdx: idx });
    adj[ends.to].push({ to: ends.from, wireIdx: idx });
  });
  var visited = {};
  var queue = [{ id: startId, path: [startId], wires: [] }];
  visited[startId] = true;
  while (queue.length > 0) {
    var cur = queue.shift();
    if (cur.id === endId) return { nodes: cur.path, wires: cur.wires };
    (adj[cur.id] || []).forEach(function(edge) {
      if (!visited[edge.to]) {
        visited[edge.to] = true;
        queue.push({ id: edge.to, path: cur.path.concat(edge.to), wires: cur.wires.concat(edge.wireIdx) });
      }
    });
  }
  return null;
}

// ===== PIN POSITION HELPERS =====
function getPinPos(nodeId, pinId, side) {
  var n = nodeMap[nodeId];
  if (!n) return {x:0,y:0};
  var pins = side === 'out' ? n.pins.out : n.pins.in;
  var idx = 0;
  for (var i = 0; i < pins.length; i++) { if (pins[i].id === pinId) { idx = i; break; } }
  var py = n.y + HEADER_H + idx * PIN_H + PIN_H/2 + 4;
  var px = side === 'out' ? n.x + n.w : n.x;
  return {x: px, y: py};
}

function resolveWireEndpoint(spec) {
  var parts = spec.split('.');
  var nodeId = parts[0], pinId = parts[1];
  var n = nodeMap[nodeId];
  if (!n) return {x:0,y:0};
  var isOut = false;
  for (var i = 0; i < n.pins.out.length; i++) { if (n.pins.out[i].id === pinId) { isOut = true; break; } }
  return getPinPos(nodeId, pinId, isOut ? 'out' : 'in');
}

function isNodeVisible(n) {
  return CAT[n.cat] && CAT[n.cat].visible;
}

// ===== DRAWING =====
function drawGrid() {
  var gs = 40 * zoom;
  var ox = panX % gs, oy = panY % gs;
  ctx.strokeStyle = '#1f2228';
  ctx.lineWidth = 1;
  for (var x = ox; x < CW; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke(); }
  for (var y = oy; y < CH; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke(); }
  var mgs = 200 * zoom;
  var mox = panX % mgs, moy = panY % mgs;
  ctx.strokeStyle = '#252830';
  for (var x = mox; x < CW; x += mgs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke(); }
  for (var y = moy; y < CH; y += mgs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke(); }
}

function drawCommentBoxes() {
  GROUPS.forEach(function(g) {
    var catRef = g.catRef ? CAT[g.catRef] : null;
    if (catRef && !catRef.visible) return;
    var x = g.x * zoom + panX;
    var y = g.y * zoom + panY;
    var w = g.w * zoom;
    var h = g.h * zoom;
    var c = g.color || '#555';
    ctx.fillStyle = c + '08';
    ctx.strokeStyle = c + '18';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w, h, 6 * zoom);
    ctx.fill();
    ctx.stroke();
    var fs = Math.max(9, Math.min(14, 12 * zoom));
    ctx.font = '600 ' + fs + 'px system-ui';
    ctx.fillStyle = c + '50';
    ctx.textAlign = 'left';
    ctx.fillText(g.label, x + 10 * zoom, y - 4 * zoom);
  });
}

function drawWires() {
  W.forEach(function(w, idx) {
    var ends = getWireNodeIds(w);
    if (!nodeMap[ends.from] || !nodeMap[ends.to]) return;
    if (!isNodeVisible(nodeMap[ends.from]) || !isNodeVisible(nodeMap[ends.to])) return;
    var p1 = resolveWireEndpoint(w.from);
    var p2 = resolveWireEndpoint(w.to);
    var x1 = p1.x * zoom + panX, y1 = p1.y * zoom + panY;
    var x2 = p2.x * zoom + panX, y2 = p2.y * zoom + panY;
    var dx = Math.abs(x2 - x1) * 0.5;

    var active = true;
    var isPath = false;
    if (pathNodes && pathWires) {
      isPath = pathWires[idx];
      active = isPath;
    } else if (selectedNode) {
      active = isWireConnected(w, selectedNode.id);
    }

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(x1 + dx, y1, x2 - dx, y2, x2, y2);
    ctx.strokeStyle = w.color || '#555';
    ctx.lineWidth = (active && (selectedNode || pathNodes)) ? Math.max(1.5, 2.5 * zoom) : Math.max(1, 2 * zoom);
    if (hoveredWire === idx) {
      ctx.globalAlpha = 1;
      ctx.lineWidth = Math.max(2.5, 3.5 * zoom);
    } else {
      ctx.globalAlpha = active ? ((selectedNode || pathNodes) ? 0.85 : 0.5) : 0.07;
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  });
}

function drawNode(n) {
  if (!isNodeVisible(n)) return;
  var x = n.x * zoom + panX;
  var y = n.y * zoom + panY;
  var w = n.w * zoom;
  var h = n.h * zoom;
  var cat = CAT[n.cat];
  if (!cat) return;
  var r = 4 * zoom;
  var hh = HEADER_H * zoom;

  var active = true;
  if (pathNodes) {
    active = !!pathNodes[n.id];
  } else if (selectedNode) {
    var connIds = getConnectedNodeIds(selectedNode.id);
    active = !!connIds[n.id];
  }

  var searchMatch = searchQuery && n.title.toLowerCase().indexOf(searchQuery.toLowerCase()) !== -1;

  ctx.globalAlpha = active ? 1.0 : 0.15;

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(ctx, x+3, y+3, w, h, r);
  ctx.fill();

  ctx.fillStyle = '#1e2028';
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();
  ctx.strokeStyle = '#2a2d38';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  roundRectTop(ctx, x, y, w, hh, r);
  ctx.fillStyle = cat.dark;
  ctx.fill();
  ctx.restore();

  ctx.beginPath();
  ctx.moveTo(x, y + hh);
  ctx.lineTo(x + w, y + hh);
  ctx.strokeStyle = '#2a2d38';
  ctx.lineWidth = 1;
  ctx.stroke();

  var titleFs = Math.max(8, Math.min(16, 11 * zoom));
  var pinFs = Math.max(7, Math.min(13, 9 * zoom));
  var pinR = Math.max(3, Math.min(8, PIN_R * zoom));
  var badgeFs = Math.max(7, Math.min(11, 8 * zoom));

  ctx.font = 'bold ' + titleFs + 'px system-ui';
  ctx.fillStyle = cat.color;
  ctx.textAlign = 'center';
  ctx.fillText(n.title, x + w/2, y + hh - 7 * zoom);

  var connCount = countConnections(n.id);
  if (connCount > 0) {
    var badgeText = String(connCount);
    ctx.font = 'bold ' + badgeFs + 'px system-ui';
    var bw = ctx.measureText(badgeText).width + 6;
    var bx = x + w - bw - 4 * zoom;
    var by = y + 3 * zoom;
    var bh = badgeFs + 4;
    ctx.fillStyle = cat.color + '30';
    roundRect(ctx, bx, by, bw, bh, 2);
    ctx.fill();
    ctx.fillStyle = cat.color;
    ctx.textAlign = 'center';
    ctx.fillText(badgeText, bx + bw/2, by + bh - 3);
  }

  var ph = PIN_H * zoom;
  n.pins.in.forEach(function(pin, i) {
    var py = y + hh + i * ph + ph/2 + 4 * zoom;
    var px = x;
    ctx.beginPath();
    ctx.arc(px, py, pinR, 0, Math.PI * 2);
    ctx.fillStyle = '#556';
    ctx.fill();
    ctx.strokeStyle = '#889';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = pinFs + 'px system-ui';
    ctx.fillStyle = '#778';
    ctx.textAlign = 'left';
    ctx.fillText(pin.label, px + 10 * zoom, py + 3 * zoom);
  });

  n.pins.out.forEach(function(pin, i) {
    var py = y + hh + i * ph + ph/2 + 4 * zoom;
    var px = x + w;
    ctx.beginPath();
    ctx.arc(px, py, pinR, 0, Math.PI * 2);
    ctx.fillStyle = '#556';
    ctx.fill();
    ctx.strokeStyle = '#889';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = pinFs + 'px system-ui';
    ctx.fillStyle = '#778';
    ctx.textAlign = 'right';
    ctx.fillText(pin.label, px - 10 * zoom, py + 3 * zoom);
  });

  if (selectedNode && selectedNode.id === n.id) {
    ctx.strokeStyle = cat.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    roundRect(ctx, x - 2, y - 2, w + 4, h + 4, r + 2);
    ctx.stroke();
  }
  if (pathTargetNode && pathTargetNode.id === n.id) {
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    roundRect(ctx, x - 2, y - 2, w + 4, h + 4, r + 2);
    ctx.stroke();
  }
  if (searchMatch) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    roundRect(ctx, x - 3, y - 3, w + 6, h + 6, r + 3);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function roundRectTop(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function getNodeAt(mx, my) {
  var sx = (mx - panX) / zoom;
  var sy = (my - panY) / zoom;
  for (var i = N.length - 1; i >= 0; i--) {
    var n = N[i];
    if (!isNodeVisible(n)) continue;
    if (sx >= n.x && sx <= n.x + n.w && sy >= n.y && sy <= n.y + n.h) return n;
  }
  return null;
}

function getWireAt(mx, my) {
  var threshold = 8;
  for (var idx = W.length - 1; idx >= 0; idx--) {
    var w = W[idx];
    var ends = getWireNodeIds(w);
    if (!nodeMap[ends.from] || !nodeMap[ends.to]) continue;
    if (!isNodeVisible(nodeMap[ends.from]) || !isNodeVisible(nodeMap[ends.to])) continue;
    var p1 = resolveWireEndpoint(w.from);
    var p2 = resolveWireEndpoint(w.to);
    var x1 = p1.x * zoom + panX, y1 = p1.y * zoom + panY;
    var x2 = p2.x * zoom + panX, y2 = p2.y * zoom + panY;
    var dx = Math.abs(x2 - x1) * 0.5;
    for (var t = 0; t <= 1; t += 0.05) {
      var it = 1 - t;
      var bx = it*it*it*x1 + 3*it*it*t*(x1+dx) + 3*it*t*t*(x2-dx) + t*t*t*x2;
      var by = it*it*it*y1 + 3*it*it*t*y1 + 3*it*t*t*y2 + t*t*t*y2;
      var d = Math.sqrt((mx - bx) * (mx - bx) + (my - by) * (my - by));
      if (d < threshold) return idx;
    }
  }
  return null;
}

// ===== MINIMAP =====
function drawMinimap() {
  var mc = document.getElementById('minimap');
  var mctx = mc.getContext('2d');
  mc.width = 180 * dpr; mc.height = 120 * dpr;
  mctx.scale(dpr, dpr);
  mctx.clearRect(0, 0, 180, 120);
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  N.forEach(function(n) {
    if (!isNodeVisible(n)) return;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.w); maxY = Math.max(maxY, n.y + n.h);
  });
  if (minX === Infinity) return;
  var rw = maxX - minX + 100, rh = maxY - minY + 100;
  var s = Math.min(170 / rw, 110 / rh);
  N.forEach(function(n) {
    if (!isNodeVisible(n)) return;
    var x = (n.x - minX + 50) * s + 5;
    var y = (n.y - minY + 50) * s + 5;
    mctx.fillStyle = CAT[n.cat].color + '80';
    mctx.fillRect(x, y, Math.max(2, n.w * s), Math.max(1, n.h * s));
  });
  var vx = (-panX / zoom - minX + 50) * s + 5;
  var vy = (-panY / zoom - minY + 50) * s + 5;
  var vw = (CW / zoom) * s;
  var vh = (CH / zoom) * s;
  mctx.strokeStyle = '#fff4';
  mctx.lineWidth = 1;
  mctx.strokeRect(vx, vy, vw, vh);
}

function render() {
  ctx.clearRect(0, 0, CW, CH);
  drawGrid();
  drawCommentBoxes();
  drawWires();
  N.forEach(drawNode);
  drawMinimap();
  requestAnimationFrame(render);
}

// ===== WIRE TOOLTIP =====
var wireTooltip = document.getElementById('wire-tooltip');
function updateWireTooltip() {
  if (hoveredWire !== null && !dragging && !isPanning) {
    var w = W[hoveredWire];
    var fromNode = nodeMap[w.from.split('.')[0]];
    var toNode = nodeMap[w.to.split('.')[0]];
    var fromPin = w.from.split('.')[1];
    var fromLabel = '';
    if (fromNode) fromNode.pins.out.forEach(function(p) { if (p.id === fromPin) fromLabel = p.label; });
    var text = (fromNode ? fromNode.title : '?') + '  \u2192  ' + (toNode ? toNode.title : '?');
    if (fromLabel) text += '  (' + fromLabel + ')';
    wireTooltip.textContent = text;
    wireTooltip.style.left = (mouseX + 14) + 'px';
    wireTooltip.style.top = (mouseY - 10) + 'px';
    wireTooltip.style.display = 'block';
  } else {
    wireTooltip.style.display = 'none';
  }
}

// ===== INFO PANEL =====
var infoPanel = document.getElementById('info-panel');
function updateInfoPanel() {
  while (infoPanel.firstChild) infoPanel.removeChild(infoPanel.firstChild);
  var target = selectedNode;
  if (!target) { infoPanel.classList.remove('visible'); return; }

  infoPanel.classList.add('visible');
  var cat = CAT[target.cat];

  var h2 = document.createElement('h2');
  h2.style.color = cat.color;
  h2.appendChild(document.createTextNode(target.title));
  infoPanel.appendChild(h2);

  var catDiv = document.createElement('div');
  catDiv.className = 'info-cat';
  catDiv.style.color = cat.color + 'aa';
  catDiv.appendChild(document.createTextNode(cat.label));
  infoPanel.appendChild(catDiv);

  if (target.path) {
    var pathDiv = document.createElement('div');
    pathDiv.className = 'info-path';
    pathDiv.appendChild(document.createTextNode(target.path));
    infoPanel.appendChild(pathDiv);
  }

  if (target.desc) {
    var descP = document.createElement('p');
    descP.style.cssText = 'color: #aab; font-size: 11px; line-height: 1.5; margin-bottom: 6px;';
    descP.appendChild(document.createTextNode(target.desc));
    infoPanel.appendChild(descP);
  }

  var connCount = countConnections(target.id);
  var badge = document.createElement('span');
  badge.className = 'info-badge';
  badge.style.background = cat.color + '25';
  badge.style.color = cat.color;
  badge.appendChild(document.createTextNode(connCount + ' connection' + (connCount !== 1 ? 's' : '')));
  infoPanel.appendChild(badge);

  var conns = getConnectionList(target.id);

  function buildConnSection(title, items, arrowChar) {
    if (items.length === 0) return;
    var sec = document.createElement('div');
    sec.className = 'info-section';
    var h3 = document.createElement('h3');
    h3.appendChild(document.createTextNode(title));
    sec.appendChild(h3);
    items.forEach(function(c) {
      var row = document.createElement('div');
      row.className = 'info-conn';
      var arrow = document.createElement('span');
      arrow.className = 'info-conn-arrow';
      arrow.appendChild(document.createTextNode(arrowChar));
      row.appendChild(arrow);
      var dot = document.createElement('span');
      dot.className = 'info-conn-dot';
      dot.style.background = CAT[c.node.cat].color;
      row.appendChild(dot);
      var nameSpan = document.createElement('span');
      nameSpan.appendChild(document.createTextNode(c.node.title));
      row.appendChild(nameSpan);
      if (c.label) {
        var labelSpan = document.createElement('span');
        labelSpan.style.cssText = 'color: #556; font-size: 10px; margin-left: auto;';
        labelSpan.appendChild(document.createTextNode(c.label));
        row.appendChild(labelSpan);
      }
      row.addEventListener('click', function() {
        selectedNode = c.node;
        panToNode(c.node);
        updateInfoPanel();
      });
      sec.appendChild(row);
    });
    infoPanel.appendChild(sec);
  }

  buildConnSection('Outgoing', conns.outgoing, '\u2192');
  buildConnSection('Incoming', conns.incoming, '\u2190');
}

function panToNode(n) {
  var cx = n.x + n.w / 2;
  var cy = n.y + n.h / 2;
  panX = CW / 2 - cx * zoom;
  panY = CH / 2 - cy * zoom;
}

// ===== SEARCH =====
var searchBox = document.getElementById('search-box');
var searchResults = document.getElementById('search-results');

searchBox.addEventListener('input', function() {
  searchQuery = searchBox.value.trim();
  updateSearchResults();
});

searchBox.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    searchBox.value = '';
    searchQuery = '';
    updateSearchResults();
    searchBox.blur();
  }
  if (e.key === 'Enter') {
    var matches = getSearchMatches();
    if (matches.length > 0) {
      selectedNode = matches[0];
      pathTargetNode = null;
      pathNodes = null;
      pathWires = null;
      panToNode(matches[0]);
      updateInfoPanel();
    }
  }
  e.stopPropagation();
});

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    searchBox.focus();
    searchBox.select();
  }
  if (e.key === 'Escape') {
    selectedNode = null;
    pathTargetNode = null;
    pathNodes = null;
    pathWires = null;
    searchBox.value = '';
    searchQuery = '';
    updateSearchResults();
    updateInfoPanel();
    updatePathHint();
  }
});

function getSearchMatches() {
  if (!searchQuery) return [];
  var q = searchQuery.toLowerCase();
  return N.filter(function(n) {
    return isNodeVisible(n) && (
      n.title.toLowerCase().indexOf(q) !== -1 ||
      (n.desc && n.desc.toLowerCase().indexOf(q) !== -1) ||
      (n.path && n.path.toLowerCase().indexOf(q) !== -1)
    );
  });
}

function updateSearchResults() {
  while (searchResults.firstChild) searchResults.removeChild(searchResults.firstChild);
  if (!searchQuery) return;
  var matches = getSearchMatches();
  matches.forEach(function(n) {
    var item = document.createElement('div');
    item.className = 'search-item';
    var dot = document.createElement('span');
    dot.className = 'search-dot';
    dot.style.background = CAT[n.cat].color;
    item.appendChild(dot);
    item.appendChild(document.createTextNode(n.title));
    item.addEventListener('click', function() {
      selectedNode = n;
      pathTargetNode = null;
      pathNodes = null;
      pathWires = null;
      panToNode(n);
      updateInfoPanel();
      updatePathHint();
    });
    searchResults.appendChild(item);
  });
  if (matches.length === 0) {
    var none = document.createElement('div');
    none.style.cssText = 'padding: 4px 6px; color: #445;';
    none.appendChild(document.createTextNode('No matches'));
    searchResults.appendChild(none);
  }
}

// ===== PATH HINT =====
var pathHint = document.getElementById('path-hint');
function updatePathHint() {
  if (selectedNode && !pathTargetNode) {
    pathHint.textContent = 'Shift+click another node to trace path from ' + selectedNode.title;
    pathHint.style.display = 'block';
  } else if (pathNodes) {
    pathHint.textContent = 'Path shown. Click anywhere or press Esc to clear.';
    pathHint.style.display = 'block';
  } else {
    pathHint.style.display = 'none';
  }
}

// ===== INTERACTION =====
cvs.addEventListener('mousedown', function(e) {
  didDrag = false;
  var n = getNodeAt(e.clientX, e.clientY);
  if (n) {
    dragging = n;
    dragOff.x = (e.clientX - panX) / zoom - n.x;
    dragOff.y = (e.clientY - panY) / zoom - n.y;
  } else {
    isPanning = true;
    panStart.x = e.clientX - panX;
    panStart.y = e.clientY - panY;
  }
});
cvs.addEventListener('mousemove', function(e) {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (dragging) {
    didDrag = true;
    dragging.x = (e.clientX - panX) / zoom - dragOff.x;
    dragging.y = (e.clientY - panY) / zoom - dragOff.y;
  } else if (isPanning) {
    didDrag = true;
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
  } else {
    var n = getNodeAt(e.clientX, e.clientY);
    if (n) {
      cvs.style.cursor = 'pointer';
      hoveredWire = null;
    } else {
      var wi = getWireAt(e.clientX, e.clientY);
      hoveredWire = wi;
      cvs.style.cursor = wi !== null ? 'crosshair' : 'default';
    }
  }
  updateWireTooltip();
});
cvs.addEventListener('mouseup', function(e) {
  if (!didDrag) {
    var n = getNodeAt(e.clientX, e.clientY);
    if (n) {
      if (e.shiftKey && selectedNode && selectedNode.id !== n.id) {
        pathTargetNode = n;
        var result = findPath(selectedNode.id, n.id);
        if (result) {
          pathNodes = {};
          result.nodes.forEach(function(id) { pathNodes[id] = true; });
          pathWires = {};
          result.wires.forEach(function(idx) { pathWires[idx] = true; });
        } else {
          pathNodes = null;
          pathWires = null;
          pathTargetNode = null;
        }
      } else {
        if (selectedNode && selectedNode.id === n.id && !pathNodes) {
          selectedNode = null;
        } else {
          selectedNode = n;
        }
        pathTargetNode = null;
        pathNodes = null;
        pathWires = null;
      }
    } else {
      selectedNode = null;
      pathTargetNode = null;
      pathNodes = null;
      pathWires = null;
    }
    updateInfoPanel();
    updatePathHint();
  }
  dragging = null;
  isPanning = false;
});
cvs.addEventListener('wheel', function(e) {
  e.preventDefault();
  var mx = e.clientX, my = e.clientY;
  var wx = (mx - panX) / zoom, wy = (my - panY) / zoom;
  zoom *= e.deltaY < 0 ? 1.1 : 0.9;
  zoom = Math.max(0.15, Math.min(2.5, zoom));
  panX = mx - wx * zoom;
  panY = my - wy * zoom;
}, {passive: false});

// ===== CONTROLS =====
document.getElementById('btn-reset').addEventListener('click', function() {
  panX = -300; panY = -50; zoom = 0.55;
  selectedNode = null; pathTargetNode = null; pathNodes = null; pathWires = null;
  updateInfoPanel(); updatePathHint();
});
document.getElementById('btn-fit').addEventListener('click', function() {
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  N.forEach(function(n) {
    if (!isNodeVisible(n)) return;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.w); maxY = Math.max(maxY, n.y + n.h);
  });
  if (minX === Infinity) return;
  var rw = maxX - minX + 100, rh = maxY - minY + 100;
  zoom = Math.min((CW - 40) / rw, (CH - 80) / rh);
  panX = -minX * zoom + 20 + (CW - rw * zoom) / 2;
  panY = -minY * zoom + 50;
});

// ===== EXPORT PNG =====
document.getElementById('btn-export').addEventListener('click', function() {
  var expCvs = document.createElement('canvas');
  var expW = CW * 2, expH = CH * 2;
  expCvs.width = expW;
  expCvs.height = expH;
  var ectx = expCvs.getContext('2d');
  ectx.scale(2, 2);
  ectx.fillStyle = '#1a1d23';
  ectx.fillRect(0, 0, CW, CH);
  var origCtx = ctx;
  ctx = ectx;
  drawGrid();
  drawCommentBoxes();
  drawWires();
  N.forEach(drawNode);
  ctx = origCtx;
  var link = document.createElement('a');
  link.download = 'vault-blueprint.png';
  link.href = expCvs.toDataURL('image/png');
  link.click();
});

// ===== LEGEND =====
function buildLegend() {
  var legBox = document.getElementById('legend-box');
  while (legBox.firstChild) legBox.removeChild(legBox.firstChild);

  // Select All / Deselect All buttons
  var btnRow = document.createElement('div');
  btnRow.className = 'leg-btns';
  var btnAll = document.createElement('button');
  btnAll.className = 'leg-btn';
  btnAll.textContent = 'All';
  btnAll.addEventListener('click', function() { setAllCategories(true); });
  var btnNone = document.createElement('button');
  btnNone.className = 'leg-btn';
  btnNone.textContent = 'None';
  btnNone.addEventListener('click', function() { setAllCategories(false); });
  btnRow.appendChild(btnAll);
  btnRow.appendChild(btnNone);
  legBox.appendChild(btnRow);

  // Category rows
  Object.keys(CAT).forEach(function(key) {
    var c = CAT[key];
    var row = document.createElement('div');
    row.className = 'leg';
    row.dataset.catKey = key;

    var check = document.createElement('div');
    check.className = 'leg-check on';
    check.appendChild(document.createTextNode('\u2713'));
    row.appendChild(check);

    var dot = document.createElement('div');
    dot.className = 'leg-dot';
    dot.style.background = c.color;
    row.appendChild(dot);

    row.appendChild(document.createTextNode(c.label));

    row.addEventListener('click', function() {
      c.visible = !c.visible;
      syncLegendRow(row, c.visible);
      clearInvisibleSelection();
    });

    legBox.appendChild(row);
  });
}

function syncLegendRow(row, visible) {
  var check = row.querySelector('.leg-check');
  if (visible) {
    row.classList.remove('disabled');
    check.classList.add('on');
    check.textContent = '\u2713';
  } else {
    row.classList.add('disabled');
    check.classList.remove('on');
    check.textContent = '';
  }
}

function setAllCategories(visible) {
  Object.keys(CAT).forEach(function(key) { CAT[key].visible = visible; });
  var rows = document.querySelectorAll('#legend-box .leg');
  rows.forEach(function(row) { syncLegendRow(row, visible); });
  clearInvisibleSelection();
}

function clearInvisibleSelection() {
  if (selectedNode && !isNodeVisible(selectedNode)) {
    selectedNode = null;
    pathTargetNode = null;
    pathNodes = null;
    pathWires = null;
    updateInfoPanel();
    updatePathHint();
  }
}

// ===== BOOT =====
loadBlueprint().then(function(data) {
  initializeData(data);
  document.getElementById('loading').classList.add('hidden');
  render();
});
</script>
